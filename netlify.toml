[build]
  publish = "public"
  command = "echo Building Netlify site"

[functions]
  directory = "netlify/functions"
  included_files = ["config/**"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/profiles/api/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200